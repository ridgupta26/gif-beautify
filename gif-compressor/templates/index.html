<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Beautifier - Compress, Style & Export</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23667eea;stop-opacity:1' /%3E%3Cstop offset='100%25' style='stop-color:%23764ba2;stop-opacity:1' /%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='20' fill='url(%23grad)'/%3E%3Cpath d='M25 35 L50 25 L75 35 L75 65 L50 75 L25 65 Z' fill='white' opacity='0.9'/%3E%3Cpath d='M40 45 L50 40 L60 45 L60 55 L50 60 L40 55 Z' fill='%23667eea'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="100" height="100" rx="20" fill="url(#logoGrad)"/>
                    <path d="M25 35 L50 25 L75 35 L75 65 L50 75 L25 65 Z" fill="white" opacity="0.9"/>
                    <path d="M40 45 L50 40 L60 45 L60 55 L50 60 L40 55 Z" fill="#667eea"/>
                </svg>
                <h1>GIF Beautifier</h1>
            </div>
            
            <button class="btn btn-primary btn-header" id="compressBtn" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span id="compressBtnText">Export GIF(s)</span>
            </button>
        </header>

        <main class="main-content">
            <div class="settings-section" id="settingsSection">
                <!-- Left Sidebar: File List -->
                <div class="file-sidebar">
                    <div class="file-sidebar-header">
                        <h4>Files</h4>
                        <span class="file-count" id="fileCount">0</span>
                    </div>
                    
                    <!-- File Upload Area in Sidebar -->
                    <div class="file-upload-sidebar" id="fileUploadSidebar">
                        <input type="file" id="fileInput" accept="image/gif,.gif" multiple hidden>
                        <button class="btn-upload-sidebar" id="addFilesBtn" type="button">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 5v14M5 12h14"/>
                            </svg>
                            <span>Add GIFs</span>
                        </button>
                        <p class="upload-hint-small">or drag & drop</p>
                    </div>
                    
                    <!-- File List -->
                    <div class="file-list-sidebar" id="fileList">
                        <div class="empty-files-message">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                <polyline points="13 2 13 9 20 9"></polyline>
                            </svg>
                            <p>No files yet</p>
                        </div>
                    </div>
                </div>
                
                <!-- Center: Preview Area -->
                <div class="large-preview-area">
                    <div class="preview-header">
                        <h3>Preview</h3>
                        <div class="file-info-inline" id="fileInfo">
                            <span style="color: var(--text-secondary);">No file selected</span>
                        </div>
                    </div>
                    
                    <div class="large-preview-container" id="previewContainer">
                        <div class="preview-wrapper" id="previewWrapper">
                            <img id="preview" src="" alt="GIF Preview" style="display: none;">
                            <div class="empty-preview" id="emptyPreview">
                                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                                <p>Add files to preview</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Right: Settings Panel -->
                <div class="settings-panel-right">
                    <div class="settings-scroll">
                        <h3>Compression</h3>
                        
                        <div class="setting-group">
                            <label>Target Size</label>
                            <div class="preset-buttons" id="targetSizeButtons">
                                <button class="preset-btn" data-value="2">< 2 MB</button>
                                <button class="preset-btn active" data-value="5">< 5 MB</button>
                                <button class="preset-btn" data-value="10">< 10 MB</button>
                            </div>
                            <div class="custom-input-group">
                                <input type="number" id="targetSizeCustom" placeholder="Custom MB" min="1" max="50" step="0.5">
                            </div>
                            <input type="hidden" id="targetSize" value="5">
                        </div>

                        <div class="setting-group">
                            <label>GIF Width</label>
                            <div class="preset-buttons" id="gifWidthButtons">
                                <button class="preset-btn" data-value="1280">1280px</button>
                                <button class="preset-btn" data-value="1440">1440px</button>
                                <button class="preset-btn active" data-value="1920">1920px</button>
                            </div>
                            <div class="custom-input-group">
                                <input type="number" id="gifWidthCustom" placeholder="Custom width" min="500" max="5000" step="100">
                            </div>
                            <input type="hidden" id="gifWidth" value="1920">
                        </div>

                        <h3>Style</h3>
                        
                        <div class="setting-group">
                            <label>Rounded Corners</label>
                            <div class="preset-buttons" id="borderRadiusButtons">
                                <button class="preset-btn" data-value="4">4</button>
                                <button class="preset-btn active" data-value="8">8</button>
                                <button class="preset-btn" data-value="16">16</button>
                            </div>
                            <div class="custom-input-group">
                                <input type="number" id="borderRadiusCustom" placeholder="Custom value" min="0" max="100">
                            </div>
                            <input type="hidden" id="borderRadius" value="8">
                        </div>

                        <div class="setting-group">
                            <label>Padding</label>
                            <div class="preset-buttons" id="paddingButtons">
                                <button class="preset-btn" data-value="24">24</button>
                                <button class="preset-btn" data-value="48">48</button>
                                <button class="preset-btn active" data-value="80">80</button>
                            </div>
                            <div class="custom-input-group">
                                <input type="number" id="paddingCustom" placeholder="Custom value" min="0" max="200">
                            </div>
                            <input type="hidden" id="offsetX" value="80">
                        </div>

                        <div class="setting-group">
                            <label>Shadow</label>
                            <div class="preset-buttons" id="shadowButtons">
                                <button class="preset-btn active" data-value="0">None</button>
                                <button class="preset-btn" data-value="small">Small</button>
                                <button class="preset-btn" data-value="medium">Medium</button>
                                <button class="preset-btn" data-value="large">Large</button>
                            </div>
                            <input type="hidden" id="shadowSize" value="0">
                        </div>

                        <h3>Background</h3>

                        <div class="setting-group">
                            <label>
                                <input type="checkbox" id="addBackground" checked>
                                Add Background
                            </label>
                        </div>

                        <div id="backgroundSettings">
                            <div class="setting-group">
                                <label>Backgrounds</label>
                                <div class="background-presets unified-grid">
                                    <!-- Gradients -->
                                    <div class="preset-item active" data-type="gradient" data-start="#667eea" data-end="#764ba2">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#f093fb" data-end="#f5576c">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#4facfe" data-end="#00f2fe">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#43e97b" data-end="#38f9d7">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#fa709a" data-end="#fee140">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#30cfd0" data-end="#330867">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#a8edea" data-end="#fed6e3">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#ff9a9e" data-end="#fecfef">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#ffecd2" data-end="#fcb69f">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#e0c3fc" data-end="#8ec5fc">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#f5f7fa" data-end="#c3cfe2">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#fdfbfb" data-end="#ebedee">
                                        <div class="preset-preview" style="background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#ffffff" data-end="#ffffff">
                                        <div class="preset-preview" style="background: #ffffff; border: 1px solid #333;"></div>
                                    </div>
                                    <div class="preset-item" data-type="gradient" data-start="#000000" data-end="#000000">
                                        <div class="preset-preview" style="background: #000000;"></div>
                                    </div>
                                    
                                    <!-- Local Wallpapers -->
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-1.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-1.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-2.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-2.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-3.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-3.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-4.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-4.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-5.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-5.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-6.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-6.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-7.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-7.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-8.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-8.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-9.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-9.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-10.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-10.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-11.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-11.jpg') }}') center/cover;"></div>
                                    </div>
                                    <div class="preset-item" data-type="image" data-url="{{ url_for('static', filename='wallpapers/wallpaper-12.jpg') }}">
                                        <div class="preset-preview" style="background: url('{{ url_for('static', filename='wallpapers/wallpaper-12.jpg') }}') center/cover;"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="button-group-vertical">
                            <button class="btn btn-secondary" id="resetBtn">Reset Settings</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="result-card">
                    <div class="success-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                    </div>
                    <h2 id="resultTitle">Compression Complete!</h2>
                    <div class="result-stats" id="resultStats"></div>
                    
                    <!-- Batch Results List -->
                    <div class="batch-results" id="batchResults" style="display: none;">
                        <!-- Individual file results will be added here -->
                    </div>
                    
                    <div class="button-group">
                        <button class="btn btn-primary" id="downloadBtn">Download Compressed GIF</button>
                        <button class="btn btn-primary" id="downloadAllBtn" style="display: none;">Download All as ZIP</button>
                        <button class="btn btn-secondary" id="newFileBtn">Beautify Another GIF</button>
                    </div>
                </div>
            </div>

            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                <div class="spinner"></div>
                <p id="loadingText">Compressing...</p>
                <p id="loadingProgress" style="font-size: 0.875rem; margin-top: 0.5rem; color: var(--text-secondary);"></p>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
